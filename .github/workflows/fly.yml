name: Fly Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "teacher/**"
      - "analyst/**"
      - "serve.py"
      - "main.py"
      - "requirements.txt"
      - "Dockerfile.fly"
      - "fly.toml"
      - ".github/workflows/fly.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy backend to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: fly-production
      cancel-in-progress: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Prepare Fly token
        shell: bash
        env:
          FLY_API_TOKEN_RAW: ${{ secrets.FLY_API_TOKEN }}
        run: |
          python - <<'PY'
          import os
          import sys

          raw = os.environ.get("FLY_API_TOKEN_RAW", "")
          clean = raw.strip().replace("\r", "").replace("\n", "")

          if not clean:
              print("FLY_API_TOKEN secret is missing or only whitespace.", file=sys.stderr)
              raise SystemExit(1)

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              env_file.write(f"FLY_API_TOKEN={clean}\n")

          print("Prepared sanitized Fly token for deploy.")
          PY

      - name: Deploy app
        run: flyctl deploy --remote-only --config fly.toml
