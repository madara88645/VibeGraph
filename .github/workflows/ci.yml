name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Backend Lint & Format (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff Linter
        run: ruff check . --select E,F --ignore E501,E402 --exclude tests/upload_cases
      - name: Run Ruff Formatter check
        run: ruff format --check . --exclude tests/upload_cases

  security-backend:
    name: Backend Security (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Security Check
        run: bandit -r . -x tests/,explorer/,node_modules/ -ll -ii

  test-backend:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --ignore=tests/test_upload.py --cov=. --cov-report=xml
        env:
          GROQ_API_KEY: dummy-key-for-ci
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: coverage.xml
          retention-days: 14

  typecheck-backend:
    name: Backend Type check (mypy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run mypy
        run: mypy . --ignore-missing-imports --no-strict-optional --allow-untyped-defs --python-version 3.12 --exclude tests --explicit-package-bases --disable-error-code=import-untyped

  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: explorer/package-lock.json
      - name: Install Dependencies
        run: npm ci
        working-directory: explorer
      - name: Frontend Linting
        run: npm run lint
        working-directory: explorer
      - name: Frontend Build
        run: npm run build
        working-directory: explorer
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: explorer/dist/
          retention-days: 14